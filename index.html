<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibeside</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      color: #1f1f1f;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 560px);
    }

    h1 {
      font-size: clamp(1.8rem, 4.5vw, 2.6rem);
      margin: 0 0 12px;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      font-size: clamp(1rem, 2.6vw, 1.1rem);
    }

    a {
      color: #1f1f1f;
      text-underline-offset: 3px;
    }

    button {
      margin-top: 8px;
      padding: 11px 20px;
      border: 1px solid #222;
      border-radius: 999px;
      background: transparent;
      color: #222;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: #222;
      color: #fff;
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello from the vibeside</h1>
    <p>This is my first site built using AI and vibe coding.</p>
    <p><a href="about.html">Learn more about me</a></p>
    <button type="button">Contact Me</button>
  </main>
</body>
</html>
