<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibeside</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: 1px solid #222;
      border-radius: 999px;
      background: transparent;
      color: #222;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: #222;
      color: #fff;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <h1>Hello from the vibeside</h1>
  <p>This is my first site built using AI and vibe coding.</p>
  <button type="button">Contact Me</button>
</body>
</html>
